kind = "web"
previewPath = "/"
title = "ELD Trip Planner"
version = "1.0.0"
id = "artifacts/trip-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18638

[services.development]
run = "pnpm --filter @workspace/trip-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trip-planner", "run", "build" ]
publicDir = "artifacts/trip-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18638"
BASE_PATH = "/"
