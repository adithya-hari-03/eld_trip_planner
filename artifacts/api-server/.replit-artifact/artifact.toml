kind = "api"
previewPath = "/api"
title = "API Server (Django)"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "sh -c 'cd /home/runner/workspace/artifacts/api-server && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8080 --noreload'"

[services.production]

[services.production.build]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/api-server && python manage.py migrate --noinput && python manage.py collectstatic --noinput"]

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/api-server && gunicorn backend.wsgi:application --bind 0.0.0.0:8080 --workers 2 --timeout 120"]

[services.production.run.env]
PORT = "8080"
DJANGO_DEBUG = "0"

[services.production.health.startup]
path = "/api/healthz"
